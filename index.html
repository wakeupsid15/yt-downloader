<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple YT Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full p-6 bg-slate-800 rounded-xl shadow-lg border border-slate-700">
        <h2 class="text-2xl font-bold mb-4 text-center">YouTube Downloader</h2>
        
        <input type="text" id="videoUrl" placeholder="Paste YouTube Link..." 
               class="w-full p-3 rounded bg-slate-700 border border-slate-600 mb-4 focus:outline-none focus:ring-2 focus:ring-red-500">
        
        <button onclick="fetchDownload()" id="btn" class="w-full bg-red-600 hover:bg-red-700 p-3 rounded font-bold transition">
            Get Download Links
        </button>

        <div id="results" class="mt-6 hidden space-y-2">
            <p class="text-sm text-slate-400">Select Resolution:</p>
            <div id="linksContainer" class="flex flex-col gap-2"></div>
        </div>
    </div>

    <script>
        async function fetchDownload() {
            const url = document.getElementById('videoUrl').value;
            const btn = document.getElementById('btn');
            const results = document.getElementById('results');
            const container = document.getElementById('linksContainer');

            if(!url) return alert("Paste a link first!");

            btn.innerText = "Searching...";
            container.innerHTML = "";

            try {
                // Using a public API (Note: These often change or have ads/limits)
                // This is a placeholder logic for how you'd call a 3rd party service
                const response = await fetch(`https://api.example-downloader.com/info?url=${url}`);
                const data = await response.json();

                // Example of creating buttons for 720p and 1080p
                data.formats.forEach(format => {
                    const a = document.createElement('a');
                    a.href = format.url;
                    a.className = "bg-slate-700 p-2 rounded text-center hover:bg-slate-600 border border-slate-500 text-sm";
                    a.innerText = `Download ${format.quality}`;
                    container.appendChild(a);
                });

                results.classList.remove('hidden');
                btn.innerText = "Get Download Links";
            } catch (err) {
                alert("API Error. Most public APIs for this are unstable.");
                btn.innerText = "Get Download Links";
            }
        }
    </script>
</body>
</html>
